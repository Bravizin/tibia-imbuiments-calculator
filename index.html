<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tibia Imbuement Calculator</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚔️</text></svg>">
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    <!-- React & ReactDOM (Development version) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel standalone for compiling JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    <!-- Inline React Component -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        const IMBUEMENTS = {
            vida: {
                name: 'Powerful Vampirism (Vida)',
                items: [
                    { id: 'vampireTeeth', name: 'Vampire Teeth', qty: 25 },
                    { id: 'bloodyPincers', name: 'Bloody Pincers', qty: 15 },
                    { id: 'pieceOfDeadBrain', name: 'Piece of Dead Brain', qty: 5 },
                ]
            },
            mana: {
                name: 'Powerful Void (Mana)',
                items: [
                    { id: 'ropeBelts', name: 'Rope Belts', qty: 25 },
                    { id: 'silencerClaws', name: 'Silencer Claws', qty: 25 },
                    { id: 'grimeleechWings', name: 'Grimeleech Wings', qty: 5 },
                ]
            },
            critico: {
                name: 'Powerful Strike (Crítico)',
                items: [
                    { id: 'protectiveCharms', name: 'Protective Charms', qty: 20 },
                    { id: 'sabretooth', name: 'Sabretooth', qty: 25 },
                    { id: 'silencerClaws', name: 'Silencer Claws', qty: 5 }, // Reusing silencer claws
                ]
            }
        };

        const GOLD_TOKEN_QTY = 6;
        const NPC_FEE = 250000;

        function formatCurrency(num) {
            if (num === 0) return '0';
            if (!num) return '';
            
            if (num >= 1000000 && num % 10000 === 0) {
                let formatted = (num / 1000000).toFixed(2).replace(/\.?0+$/, '');
                return formatted.replace('.', ',') + 'kk';
            } else if (num >= 1000 && num % 10 === 0) {
                let formatted = (num / 1000).toFixed(2).replace(/\.?0+$/, '');
                return formatted.replace('.', ',') + 'k';
            } else {
                return new Intl.NumberFormat('pt-BR').format(num);
            }
        }

        function parseCurrency(val) {
            if (!val) return 0;
            let str = String(val).toLowerCase().trim();
            let multiplier = 1;
            
            if (str.endsWith('kk')) {
                multiplier = 1000000;
                str = str.slice(0, -2);
            } else if (str.endsWith('k')) {
                multiplier = 1000;
                str = str.slice(0, -1);
            } else if (str.endsWith('m')) {
                multiplier = 1000000;
                str = str.slice(0, -1);
            }

            if (multiplier > 1) {
                str = str.replace(',', '.');
                return Math.floor(parseFloat(str) * multiplier) || 0;
            } else {
                str = str.replace(/\./g, '');
                str = str.replace(',', '.');
                return Math.floor(parseFloat(str)) || 0;
            }
        }

        function ImbuementCalculator() {
            const [selectedType, setSelectedType] = useState('vida');
            const [goldTokenPrice, setGoldTokenPrice] = useState('');
            const [itemPrices, setItemPrices] = useState({});
            const [copiedItem, setCopiedItem] = useState(null);

            const copyToClipboard = (text) => {
                navigator.clipboard.writeText(text).then(() => {
                    setCopiedItem(text);
                    setTimeout(() => setCopiedItem(null), 2000);
                }).catch(err => {
                    console.error('Failed to copy: ', err);
                });
            };

            const handleItemPriceChange = (id, value) => {
                setItemPrices(prev => ({
                    ...prev,
                    [id]: value
                }));
            };

            const currentImbuement = IMBUEMENTS[selectedType];

            // Calculate Costs
            const goldTokenCost = parseCurrency(goldTokenPrice) * GOLD_TOKEN_QTY;
            
            let itemsCost = 0;
            currentImbuement.items.forEach(item => {
                const price = parseCurrency(itemPrices[item.id]);
                itemsCost += price * item.qty;
            });

            // Total Cost (Items/Tokens + Fee)
            const totalWithTokens = goldTokenCost + NPC_FEE;
            const totalWithItems = itemsCost + NPC_FEE;

            const bestOption = totalWithTokens > 0 && totalWithItems > 0
                ? (totalWithItems <= totalWithTokens ? 'items' : 'tokens')
                : null;
            
            const difference = bestOption === 'items' 
                ? totalWithTokens - totalWithItems 
                : totalWithItems - totalWithTokens;

            return (
                <div className="app-container">
                    <div className="glass-panel main-panel">
                        <h1 className="title">
                            <span className="text-gradient">Tibia Imbuement</span> Calculator
                        </h1>
                        
                        <div className="type-selector">
                            {Object.entries(IMBUEMENTS).map(([key, data]) => (
                                <button 
                                    key={key}
                                    className={`type-btn ${selectedType === key ? 'active' : ''}`}
                                    onClick={() => setSelectedType(key)}
                                >
                                    {data.name}
                                </button>
                            ))}
                        </div>

                        <div className="calculator-grid">
                            <div className="items-column">
                                <h2 className="section-title">Preço dos Itens</h2>
                                <div className="input-group-list">
                                    {currentImbuement.items.map(item => (
                                        <div className="input-group" key={item.id}>
                                            <label 
                                                className="item-label-clickable" 
                                                onClick={() => copyToClipboard(item.name)}
                                                title="Clique para copiar o nome"
                                            >
                                                <span className="item-qty">{item.qty}x</span> 
                                                <span className="item-name-text">{item.name}</span>
                                                {copiedItem === item.name && <span className="copy-feedback">✓ Copiado</span>}
                                            </label>
                                            <div className="input-wrapper">
                                                <input 
                                                    type="text" 
                                                    placeholder="0"
                                                    value={itemPrices[item.id] || ''}
                                                    onChange={(e) => handleItemPriceChange(item.id, e.target.value)}
                                                />
                                                <span className="currency-suffix">gp</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className="tokens-column">
                                <h2 className="section-title">Gold Token</h2>
                                <div className="input-group highlight-input">
                                    <label>Valor Unitário do Gold Token</label>
                                    <div className="input-wrapper">
                                        <input 
                                            type="text" 
                                            placeholder="0"
                                            value={goldTokenPrice || ''}
                                            onChange={(e) => setGoldTokenPrice(e.target.value)}
                                        />
                                        <span className="currency-suffix">gp</span>
                                    </div>
                                    <p className="token-info">Serão necessários {GOLD_TOKEN_QTY}x Gold Tokens</p>
                                </div>
                            </div>
                        </div>

                        <div className="results-panel">
                            <div className="result-cards">
                                <div className={`result-card ${bestOption === 'items' ? 'winner' : ''}`}>
                                    <h3>Fazer com Itens</h3>
                                    <div className="cost-breakdown">
                                        <span>Itens:</span>
                                        <span>{formatCurrency(itemsCost)} gp</span>
                                    </div>
                                    <div className="cost-breakdown">
                                        <span>Taxa NPC:</span>
                                        <span>{formatCurrency(NPC_FEE)} gp</span>
                                    </div>
                                    <div className="total-cost">
                                        Total: {formatCurrency(totalWithItems)} gp
                                    </div>
                                </div>

                                <div className={`result-card ${bestOption === 'tokens' ? 'winner' : ''}`}>
                                    <h3>Fazer com Gold Tokens</h3>
                                    <div className="cost-breakdown">
                                        <span>Tokens:</span>
                                        <span>{formatCurrency(goldTokenCost)} gp</span>
                                    </div>
                                    <div className="cost-breakdown">
                                        <span>Taxa NPC:</span>
                                        <span>{formatCurrency(NPC_FEE)} gp</span>
                                    </div>
                                    <div className="total-cost">
                                        Total: {formatCurrency(totalWithTokens)} gp
                                    </div>
                                </div>
                            </div>

                            {bestOption && (
                                <div className="conclusion">
                                    <div className="verdict">
                                        Melhor Opção: <strong className="text-gradient">
                                            {bestOption === 'items' ? 'Comprar Itens no Market' : 'Comprar Gold Tokens'}
                                        </strong>
                                    </div>
                                    <div className="savings">
                                        Economia de <strong>{formatCurrency(difference)} gp</strong>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                    
                    <footer className="footer">
                        Criado com ♥ para a comunidade de Tibia
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ImbuementCalculator />);
    </script>
</body>
</html>
